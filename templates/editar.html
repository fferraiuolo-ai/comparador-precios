<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        .form-container { background: white; padding: 24px; border-radius: 8px; max-width: 600px; }
        label { display: block; margin-top: 16px; margin-bottom: 4px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        .btn { background: #0066cc; color: white; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .btn:hover { background: #0052a3; }
        .volver { display: inline-block; margin-bottom: 16px; color: #0066cc; text-decoration: none; }
        .hint { font-size: 12px; color: #888; margin-top: 2px; }
    </style>
</head>
<body>
    <a href="/" class="volver">← Volver</a>
    <h1>Editar Producto</h1>
    <div class="form-container">
        <form method="POST">
            <label>Proveedor</label>
            <select name="proveedor" required>
                <option value="">-- Seleccioná un proveedor --</option>
                {% for p in proveedores %}
                <option value="{{ p }}" {% if producto['proveedor'] == p %}selected{% endif %}>{{ p }}</option>
                {% endfor %}
            </select>

            <label>Nombre del producto</label>
            <input type="text" name="nombre" value="{{ producto['nombre'] }}" required>

            <label>URL en Puppis</label>
            <input type="url" name="url_puppis" value="{{ producto['url_puppis'] or '' }}">

            <label>URL en Natural Life</label>
            <input type="url" name="url_naturallife" value="{{ producto['url_naturallife'] or '' }}">

            <label>URL en Nutrican</label>
            <input type="url" name="url_nutrican" value="{{ producto['url_nutrican'] or '' }}">

            <label>Variante en Nutrican</label>
            <select name="variante_nutrican">
                <option value="">-- Sin variante --</option>
                <option value="1 Kg" {% if producto['variante_nutrican'] == '1 Kg' %}selected{% endif %}>1 Kg</option>
                <option value="3 Kg" {% if producto['variante_nutrican'] == '3 Kg' %}selected{% endif %}>3 Kg</option>
                <option value="7,5 Kg" {% if producto['variante_nutrican'] == '7,5 Kg' %}selected{% endif %}>7,5 Kg</option>
                <option value="15 Kg" {% if producto['variante_nutrican'] == '15 Kg' %}selected{% endif %}>15 Kg</option>
                <option value="18 Kg" {% if producto['variante_nutrican'] == '18 Kg' %}selected{% endif %}>18 Kg</option>
                <option value="20 Kg" {% if producto['variante_nutrican'] == '20 Kg' %}selected{% endif %}>20 Kg</option>
            </select>
            <p class="hint">Seleccioná el tamaño del producto en Nutrican</p>

            <label>URL en Drovenort</label>
            <input type="url" name="url_drovenort" value="{{ producto['url_drovenort'] or '' }}">

            <label>URL en Kangoo Pet</label>
            <input type="url" name="url_kangoopet" value="{{ producto['url_kangoopet'] or '' }}">

            <button type="submit" class="btn">Guardar Cambios</button>
        </form>
    </div>
</body>
</html>
