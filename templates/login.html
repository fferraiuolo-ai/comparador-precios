<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Comparador de Precios</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 32px; border-radius: 8px; width: 100%; max-width: 360px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #0066cc; text-align: center; margin-bottom: 24px; font-size: 22px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #555; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; margin-bottom: 16px; }
        .btn { background: #0066cc; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        .btn:hover { background: #0052a3; }
        .error { background: #ffe0e0; color: #dc3545; padding: 10px; border-radius: 4px; margin-bottom: 16px; font-size: 14px; }
        .logo { text-align: center; margin-bottom: 8px; font-size: 32px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🐾</div>
        <h1>Comparador de Precios</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label>Usuario</label>
            <input type="text" name="usuario" placeholder="Tu usuario" required autofocus>
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Tu contraseña" required>
            <button type="submit" class="btn">Ingresar</button>
        </form>
    </div>
</body>
</html>
