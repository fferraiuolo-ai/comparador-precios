<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Producto</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        h1 { color: #333; }
        .form-container { background: white; padding: 24px; border-radius: 8px; max-width: 600px; }
        label { display: block; margin-top: 16px; margin-bottom: 4px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        .btn { background: #0066cc; color: white; padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .btn:hover { background: #0052a3; }
        .volver { display: inline-block; margin-bottom: 16px; color: #0066cc; text-decoration: none; }
        .hint { font-size: 12px; color: #888; margin-top: 2px; }
    </style>
</head>
<body>
    <a href="/" class="volver">← Volver</a>
    <h1>Agregar Producto</h1>
    <div class="form-container">
        <form method="POST">
            <label>Proveedor</label>
            <select name="proveedor" id="select-proveedor" onchange="toggleNuevoProveedor()" required>
                <option value="">-- Seleccioná un proveedor --</option>
                {% for p in proveedores %}
                <option value="{{ p }}">{{ p }}</option>
                {% endfor %}
                <option value="__nuevo__">+ Agregar nuevo proveedor...</option>
            </select>
            <input type="text" id="input-nuevo-proveedor" name="nuevo_proveedor" placeholder="Escribí el nombre del proveedor" style="display:none; margin-top:8px;">
            <script>
            function toggleNuevoProveedor() {
                var sel = document.getElementById('select-proveedor');
                var inp = document.getElementById('input-nuevo-proveedor');
                if (sel.value === '__nuevo__') {
                    inp.style.display = 'block';
                    inp.required = true;
                    sel.required = false;
                } else {
                    inp.style.display = 'none';
                    inp.required = false;
                    sel.required = true;
                }
            }
            </script>

            <label>Nombre del producto</label>
            <input type="text" name="nombre" placeholder="Ej: Royal Canin Adulto 15kg" required>

            <label>URL en Puppis</label>
            <input type="url" name="url_puppis" placeholder="https://www.puppis.com.ar/...">

            <label>URL en Natural Life</label>
            <input type="url" name="url_naturallife" placeholder="https://www.natural-life.com.ar/...">

            <label>URL en Nutrican</label>
            <input type="url" name="url_nutrican" placeholder="https://www.nutrican.com.ar/...">

            <label>Variante en Nutrican</label>
            <select name="variante_nutrican">
                <option value="">-- Sin variante --</option>
                <option value="1 Kg">1 Kg</option>
                <option value="3 Kg">3 Kg</option>
                <option value="7,5 Kg">7,5 Kg</option>
                <option value="12 Kg">12 Kg</option>
                <option value="15 Kg">15 Kg</option>
                <option value="18 Kg">18 Kg</option>
                <option value="20 Kg">20 Kg</option>
            </select>
            <p class="hint">Seleccioná el tamaño del producto en Nutrican</p>

            <label>URL en Drovenort</label>
            <input type="url" name="url_drovenort" placeholder="https://www.drovenort.com.ar/...">

            <label>URL en Kangoo Pet</label>
            <input type="url" name="url_kangoopet" placeholder="https://www.kangoopet.com.ar/...">

            <button type="submit" class="btn">Guardar Producto</button>
        </form>
    </div>
</body>
</html>
